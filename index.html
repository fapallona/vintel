let _lang="en";
function setLang(l){_lang=l}
function t(key){return I18N[key]?.[_lang]||I18N[key]?.en||key}
function fpLabel(v){return t(["","fp1","fp2","fp3","fp4","fp5","fp6","fp7","fp8","fp9","fp10"][v]||"")}

function tType(type){const map={Red:"tRed",White:"tWhite","Rosé":"tRose",Sparkling:"tSparkling",Dessert:"tDessert"};return map[type]?t(map[type]):type}

// ─── AI ───────────────────────────────────────────────────────────
let _apiKey = "";
function setAIKey(k){_apiKey=k}

async function callAI(system, messages) {
  if(!_apiKey) return null;
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system, messages })
    });
    const d = await r.json();
    if(d.error) return t("apiError")+(d.error.message||"Unbekannt");
    return d.content?.map(b=>b.text).filter(Boolean).join("\n") || null;
  } catch(e) { return t("connectionError")+e.message; }
}

async function askSommelier(msg, wines, history) {
  if(!_apiKey) return t("apiKeyNeeded");
  const inv = wines.length === 0 ? (_lang==="de"?"Sammlung ist leer.":"Collection is empty.") :
    wines.map(w=>`• [${w.cat||"Wine"}] ${w.vineyard||""} — ${w.name||""} | ${w.type||""} | ${w.cat==="Spirit"?(w.abv||""):(w.grape||"")} | ${w.country||""}${w.region?", "+w.region:""} ${w.year||""} | ${w.qty||1}× | €${w.price||0} | ${w.drinkFrom?(w.drinkFrom+"-"+(w.drinkTo||"")+" yrs"):""} | ${w.rating||0} FP${w.notes?' | "'+w.notes+'"':""}`).join("\n");
  const sys = _lang==="de" ? `Du bist ein freundlicher, kompetenter Getränkeberater in einer modernen Sammlungs-App. Die Sammlung des Users:\n\n${inv}\n\nRegeln:\n- Antworte auf Deutsch\n- Empfehle zuerst aus der Sammlung; schlage Käufe vor wenn nichts passt\n- Kurz und prägnant (2-3 Absätze), warm aber nicht kitschig\n- Bei Wein: Temperatur, Dekantieren, Speiseempfehlung\n- Bei Spirituosen: Wie servieren (pur, on the rocks, Cocktails)\n- Nenne konkrete Flaschen beim Namen\n- Kein Weinsnob-Ton — wie ein guter Freund der sich auskennt` : `You are a friendly, knowledgeable drinks advisor in a collection app. The user's collection:\n\n${inv}\n\nRules:\n- Answer in English\n- Recommend from their collection first\n- Concise (2-3 paragraphs)\n- Wine: temperature, decanting, food pairing\n- Spirits: how to serve\n- Name specific bottles\n- Friendly tone, no wine snobbery`;
  const reply = await callAI(sys, [...history.map(h=>({role:h.role,content:h.content})), {role:"user",content:msg}]);
  return reply || t("somethingWrong");
}

async function identifyWine(base64, mediaType) {
  if(!_apiKey) return null;
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
          {type:"text",text:`Identify this bottle from the label. It could be wine OR a spirit (whisky, rum, gin, etc). Return ONLY JSON (no markdown):\n{"name":"...","type":"...","grape":"...","country":"...","region":"...","vineyard":"...","year":2020,"ausbau":"...","confidence":"high|medium|low","description":"...","abv":"..."}\n\nIMPORTANT RULES for "name" and "vineyard":\n- "vineyard" = the producer/brand/distillery name\n- "name" = ONLY the specific product/wine name WITHOUT the producer, WITHOUT the year, and WITHOUT the grape variety. The grape goes ONLY in the "grape" field, NEVER in "name".\n  Example: "Rudi Pichler Riesling Ried Hochrain Smaragd 2024" → vineyard="Rudi Pichler", name="Ried Hochrain Smaragd", grape="Riesling", year=2024\n  Example: "Domäne Wachau Grüner Veltliner Federspiel Gneis" → vineyard="Domäne Wachau", name="Federspiel Gneis", grape="Grüner Veltliner"\n- For spirits, "grape" should be empty, and include "abv" if visible on label\n\nType options for wine: ${WINE_TYPES.join(",")}. Type options for spirits: ${SPIRIT_TYPES.join(",")}.\nCountry options: ${COUNTRIES.join(",")}. Region options (by country): ${Object.entries(COUNTRIES_REGIONS).map(([c,rs])=>`${c}: ${rs.join(",")}`).join("; ")}. Grape options (wine only): ${GRAPES.join(",")}. Ausbau options (wine only): ${AUSBAU.join(",")}. null for unknowns.`}
        ]}]
      })
    });
    const d = await r.json();
    const t = d.content?.map(b=>b.text).filter(Boolean).join("")||"";
    return JSON.parse(t.replace(/```json|```/g,"").trim());
  } catch(e) { return null; }
}

// ─── Import Collection ────────────────────────────────────────────
const ImportCollection = ({onImport})=>{
  const [text,setText]=useState("");
  const [file,setFile]=useState(null);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [expanded,setExpanded]=useState(false);
  const fileRef=useRef();

  const handleFile=async(e)=>{
    const f=e.target.files?.[0]; if(!f)return;
    if(f.type.startsWith("image/")){
      const reader=new FileReader();
      reader.onload=()=>{setFile({name:f.name,type:f.type,data:reader.result.split(",")[1],preview:reader.result})};
      reader.readAsDataURL(f);
    } else {
      const t=await f.text();
      setText(t);setFile({name:f.name,type:"text"});
    }
  };

  const processImport=async()=>{
    if(!text&&!file?.data)return;
    setLoading(true);setResult(null);
    try {
      const content = file?.data
        ? [{type:"image",source:{type:"base64",media_type:file.type,data:file.data}},{type:"text",text:"Parse this wine/spirit list into structured data."}]
        : [{type:"text",text:`Parse this wine/spirit list into structured data:\n\n${text}`}];

      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,
          messages:[{role:"user",content:[...content,{type:"text",text:`Parse every item from this list into a JSON array. Return ONLY valid JSON (no markdown, no backticks, no explanation).

Each item should be: {"cat":"Wine"|"Spirit","type":"...","vineyard":"producer/brand","name":"product name (no producer, no year)","grape":"","country":"...","region":"...","year":"","price":15,"ausbau":"","drinkWindow":"","qty":1,"rating":0,"notes":"","img":null,"abv":""}

Wine types: ${WINE_TYPES.join(",")}
Spirit types: ${SPIRIT_TYPES.join(",")}
Country/Region options: ${Object.entries(COUNTRIES_REGIONS).map(([c,rs])=>c+": "+rs.join(",")).join("; ")}
Grape options: ${GRAPES.join(",")}
Ausbau options: ${AUSBAU.join(",")}

Rules:
- "vineyard" = producer/brand/distillery ONLY
- "name" = wine/product name WITHOUT producer, WITHOUT year
- For spirits: grape="" and include abv if known
- If price has asterisks (0=€15, *=€25, **=€35, ***=€50) use that
- If GH mentioned: ausbau="Oak Barrel (used)", KH: "Barrique", S: "Stainless Steel"
- Detect the correct country and region
- Return the full JSON array with ALL items`}]}]
        })
      });
      const d=await r.json();
      const raw=d.content?.map(b=>b.text).filter(Boolean).join("")||"";
      const cleaned=raw.replace(/```json|```/g,"").trim();
      const items=JSON.parse(cleaned);
      setResult({items,error:null});
    } catch(e){
      setResult({items:null,error:"Could not parse the list. Try a clearer format or paste as text."});
    }
    setLoading(false);
  };

  const confirmImport=()=>{
    if(result?.items){onImport(result.items);setResult(null);setText("");setFile(null);setExpanded(false);}
  };

  if(!expanded) return(
    <div style={{marginTop:24,paddingTop:20,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
      <button onClick={()=>setExpanded(true)} style={{
        width:"100%",padding:"14px",borderRadius:12,border:"1px dashed rgba(255,255,255,0.10)",background:"transparent",
        color:"rgba(255,255,255,0.38)",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",
        display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all 0.2s"
      }}
      onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.22)";e.currentTarget.style.color="rgba(255,255,255,0.62)"}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.10)";e.currentTarget.style.color="rgba(255,255,255,0.38)"}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Import collection
      </button>
    </div>
  );

  return(
    <div style={{marginTop:24,paddingTop:20,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h3 style={{fontSize:15,fontWeight:700,color:"#fff",margin:0,fontFamily:"'Outfit',sans-serif"}}>Import collection</h3>
        <button onClick={()=>{setExpanded(false);setResult(null);setText("");setFile(null)}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.38)",fontSize:18,cursor:"pointer"}}>✕</button>
      </div>
      <p style={{fontSize:12,color:"rgba(255,255,255,0.38)",margin:"0 0 12px",fontFamily:"'Outfit',sans-serif"}}>
        Upload a photo of your wine list, or paste it as text. AI will parse it into your collection.
      </p>

      {/* File upload */}
      <div onClick={()=>fileRef.current?.click()} style={{
        border:"1px dashed rgba(255,255,255,0.10)",borderRadius:12,padding:file?.preview?0:20,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        cursor:"pointer",background:"rgba(255,255,255,0.02)",minHeight:60,overflow:"hidden",
        marginBottom:10,position:"relative",transition:"all 0.2s"
      }}>
        {file?.preview?<img src={file.preview} alt="" style={{width:"100%",maxHeight:140,objectFit:"cover",borderRadius:11}}/>:
        <span style={{fontSize:13,color:"rgba(255,255,255,0.38)",fontFamily:"'Outfit',sans-serif"}}>
          {file?`📄 ${file.name}`:"Tap to upload image or file"}
        </span>}
      </div>
      <input ref={fileRef} type="file" accept="image/*,.txt,.csv,.pdf" onChange={handleFile} style={{display:"none"}}/>

      {/* Text input */}
      <textarea value={text} onChange={e=>setText(e.target.value)} rows={4} placeholder="Or paste your wine/spirit list here..."
        style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.10)",borderRadius:10,padding:"11px 14px",color:"#fff",fontSize:13,outline:"none",resize:"vertical",fontFamily:"'Outfit',sans-serif",marginBottom:10}}/>

      <button onClick={processImport} disabled={loading||(!text&&!file?.data)} style={{
        width:"100%",padding:"12px",borderRadius:10,border:"none",
        background:(text||file?.data)&&!loading?"#fff":"rgba(255,255,255,0.07)",
        color:(text||file?.data)&&!loading?"#1e2028":"rgba(255,255,255,0.22)",
        fontSize:14,fontWeight:700,cursor:(text||file?.data)&&!loading?"pointer":"not-allowed",fontFamily:"'Outfit',sans-serif",transition:"all 0.2s"
      }}>
        {loading?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <div style={{width:14,height:14,border:"2px solid currentColor",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
          Analysing...
        </span>:"Parse with AI"}
      </button>

      {/* Results */}
      {result?.error&&<div style={{marginTop:10,padding:"10px 14px",background:"rgba(239,68,68,0.08)",borderRadius:10,border:"1px solid rgba(239,68,68,0.15)"}}>
        <span style={{fontSize:12,color:"#f87171",fontFamily:"'Outfit',sans-serif"}}>{result.error}</span>
      </div>}

      {result?.items&&<div style={{marginTop:12}}>
        <div style={{padding:"10px 14px",background:"rgba(34,197,94,0.08)",borderRadius:10,border:"1px solid rgba(34,197,94,0.15)",marginBottom:10}}>
          <span style={{fontSize:12,color:"#4ade80",fontFamily:"'Outfit',sans-serif",fontWeight:500}}>✓ Found {result.items.length} items</span>
        </div>
        <div style={{maxHeight:200,overflow:"auto",marginBottom:10}}>
          {result.items.slice(0,10).map((it,i)=>(
            <div key={i} style={{padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:13,color:"rgba(255,255,255,0.62)",fontFamily:"'Outfit',sans-serif"}}>
              <span style={{color:"#fff",fontWeight:600}}>{it.vineyard}</span> — {it.name} <span style={{opacity:0.4}}>({it.type}, {it.country})</span>
            </div>
          ))}
          {result.items.length>10&&<div style={{padding:"8px 0",fontSize:12,color:"rgba(255,255,255,0.32)",fontFamily:"'Outfit',sans-serif"}}>
            ...and {result.items.length-10} more
          </div>}
        </div>
        <button onClick={confirmImport} style={{
          width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#fff",color:"#1e2028",
          fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Outfit',sans-serif"
        }}>Add {result.items.length} items to collection</button>
      </div>}
    </div>
  );
};

// ─── Stats ────────────────────────────────────────────────────────
const Stats = ({wines:allItems})=>{
  const [view,setView]=useState("Wine");
  const items=allItems.filter(w=>w.cat===view);
  const allCount=allItems.reduce((s,w)=>s+w.qty,0);
  const total=items.reduce((s,w)=>s+w.qty,0);
  const value=items.reduce((s,w)=>s+w.price*w.qty,0);
  const avg=total?Math.round(value/total):0;

  const isWine=view==="Wine";
  const types=isWine?WINE_TYPES:SPIRIT_TYPES;
  const tc={};items.forEach(w=>{tc[w.type]=(tc[w.type]||0)+w.qty});
  const maxT=Math.max(...Object.values(tc).filter(Boolean),1);

  // Oldest vintage (wine only)
  const winesWithYear=items.filter(w=>w.year);
  const oldest=winesWithYear.length?Math.min(...winesWithYear.map(w=>w.year)):null;

  // Drink window (wine only) — by year
  const thisYear=new Date().getFullYear();
  const dwBuckets={[t("overdue")]:0,[t("drinkNow")]:0,[t("y13")]:0,[t("y35")]:0,[t("y510")]:0,[t("y10")]:0};
  items.forEach(w=>{
    if(!w.drinkFrom&&!w.drinkTo) return;
    const from=parseInt(w.drinkFrom)||0;
    const to=parseInt(w.drinkTo)||0;
    if(to&&to<thisYear) dwBuckets[t("overdue")]+=w.qty;
    else if(from&&from<=thisYear&&(!to||to>=thisYear)) dwBuckets[t("drinkNow")]+=w.qty;
    else if(from){
      const wait=from-thisYear;
      if(wait<=3) dwBuckets[t("y13")]+=w.qty;
      else if(wait<=5) dwBuckets[t("y35")]+=w.qty;
      else if(wait<=10) dwBuckets[t("y510")]+=w.qty;
      else dwBuckets[t("y10")]+=w.qty;
    }
  });
  const dwOrder=[t("overdue"),t("drinkNow"),t("y13"),t("y35"),t("y510"),t("y10")];
  const maxDw=Math.max(...Object.values(dwBuckets).filter(Boolean),1);
  const dwColors={[t("overdue")]:"#ef4444",[t("drinkNow")]:"#4ade80",[t("y13")]:"#86efac",[t("y35")]:"#fde047",[t("y510")]:"#fbbf24",[t("y10")]:"#d97706"};

  // Country → region — push Unknown to bottom
  const countryData={};
  items.forEach(w=>{
    const c=w.country||"Unknown";
    if(!countryData[c]) countryData[c]={total:0,regions:{}};
    countryData[c].total+=w.qty;
    const r=w.region||"Unknown";
    countryData[c].regions[r]=(countryData[c].regions[r]||0)+w.qty;
  });
  const sortedCountries=Object.entries(countryData)
    .sort((a,b)=>a[0]==="Unknown"?1:b[0]==="Unknown"?-1:b[1].total-a[1].total);

  // Top grapes (wine) or top brands (spirit)
  const gc={};
  if(isWine){items.filter(w=>w.grape).forEach(w=>{gc[w.grape]=(gc[w.grape]||0)+w.qty})}
  else{items.forEach(w=>{const k=w.vineyard||"Unknown";gc[k]=(gc[k]||0)+w.qty})}
  const topItems=Object.entries(gc).sort((a,b)=>a[0]==="Unknown"?1:b[0]==="Unknown"?-1:b[1]-a[1]).slice(0,8);
  const maxG=Math.max(...topItems.map(([,n])=>n),1);

  const Stat=({label,val,sub})=>(
    <div style={{background:"rgba(255,255,255,0.02)",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",padding:"20px 18px"}}>
      <div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.42)",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'Outfit',sans-serif"}}>{label}</div>
      <div style={{fontSize:28,fontWeight:700,color:"#fff",marginTop:4,fontFamily:"'Outfit',sans-serif",letterSpacing:"-0.02em"}}>{val}</div>
      {sub&&<div style={{fontSize:12,color:"rgba(255,255,255,0.38)",marginTop:2,fontFamily:"'Outfit',sans-serif"}}>{sub}</div>}
    </div>
  );

  const Bar=({label,n,max,color,labelWidth})=>(
    <div style={{display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:13,color:"rgba(255,255,255,0.72)",width:labelWidth||100,fontFamily:"'Outfit',sans-serif",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flexShrink:0}}>{label}</span>
      <div style={{flex:1,height:6,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden",minWidth:40}}>
        <div style={{height:"100%",width:`${n?Math.max((n/max)*100,4):0}%`,background:color||"rgba(255,255,255,0.32)",borderRadius:3,transition:"width 0.5s ease"}}/>
      </div>
      <span style={{fontSize:13,color:"rgba(255,255,255,0.52)",width:28,textAlign:"right",fontFamily:"'Outfit',sans-serif",fontWeight:600,flexShrink:0}}>{n}</span>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Wine / Spirit Toggle */}
      <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",overflow:"hidden"}}>
        {["Wine","Spirit"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{
            flex:1,padding:"10px 0",border:"none",
            background:view===v?"rgba(255,255,255,0.10)":"transparent",
            color:view===v?"#fff":"rgba(255,255,255,0.38)",
            fontSize:13,fontWeight:view===v?700:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.2s"
          }}>{v==="Wine"?"🍷 Wine":"🥃 Spirits"} <span style={{opacity:0.4,fontSize:11}}>{allItems.filter(w=>w.cat===v).reduce((s,w)=>s+w.qty,0)}</span></button>
        ))}
      </div>

      {/* Key figures */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Stat label={t("bottlesLabel")} val={total} sub={`${items.length} ${t("unique")} ${isWine?t("wines"):"Spirits"}`}/>
        <Stat label={t("value")} val={`€${value.toLocaleString()}`} sub={`€${avg} ${t("avg")}`}/>
        {isWine&&<Stat label={t("drinkNow")} val={dwBuckets[t("drinkNow")]||0} sub={t("winesInWindow")}/>}
        {isWine&&<Stat label={t("oldestVintage")} val={oldest||"—"} sub={oldest?`${new Date().getFullYear()-oldest} years`:""}/>}
        {!isWine&&<Stat label={t("brands")} val={[...new Set(items.map(w=>w.vineyard).filter(Boolean))].length}/>}
        {!isWine&&<Stat label={t("countries")} val={[...new Set(items.map(w=>w.country).filter(Boolean))].length}/>}
      </div>

      {/* By type */}
      <div style={{background:"rgba(255,255,255,0.02)",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",padding:20}}>
        <div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.42)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16,fontFamily:"'Outfit',sans-serif"}}>By type</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {types.filter(t=>tc[t]).map(t=>{const c=TC[t]||TC.Other;return(
            <div key={t}><Bar label={t} n={tc[t]} max={maxT} color={c.dot} labelWidth={isWine?72:120}/></div>
          )})}
        </div>
      </div>

      {/* Drinking window (wine only) */}
      {isWine&&Object.values(dwBuckets).some(v=>v>0)&&<div style={{background:"rgba(255,255,255,0.02)",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",padding:20}}>
        <div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.42)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16,fontFamily:"'Outfit',sans-serif"}}>{t("drinkWindow")}</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {dwOrder.filter(d=>dwBuckets[d]).map(d=>(
            <div key={d}><Bar label={d} n={dwBuckets[d]} max={maxDw} color={dwColors[d]||"rgba(255,255,255,0.32)"} labelWidth={100}/></div>
          ))}
        </div>
      </div>}

      {/* Countries with region breakdown — Unknown at bottom */}
      {sortedCountries.length>0&&<div style={{background:"rgba(255,255,255,0.02)",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",padding:20}}>
        <div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.42)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14,fontFamily:"'Outfit',sans-serif"}}>By origin</div>
        {sortedCountries.map(([country,data],ci)=>{
          const regions=Object.entries(data.regions).sort((a,b)=>a[0]==="Unknown"?1:b[0]==="Unknown"?-1:b[1]-a[1]);
          return(
            <div key={country} style={{marginBottom:ci<sortedCountries.length-1?16:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:14,fontWeight:700,color:country==="Unknown"?"rgba(255,255,255,0.42)":"#fff",fontFamily:"'Outfit',sans-serif"}}>{country}</span>
                <span style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.52)",fontFamily:"'Outfit',sans-serif"}}>{data.total}</span>
              </div>
              {regions.map(([region,count])=>(
                <div key={region} style={{display:"flex",justifyContent:"space-between",padding:"5px 0 5px 16px"}}>
                  <span style={{fontSize:13,color:region==="Unknown"?"rgba(255,255,255,0.32)":"rgba(255,255,255,0.52)",fontFamily:"'Outfit',sans-serif"}}>{region}</span>
                  <span style={{fontSize:13,color:"rgba(255,255,255,0.38)",fontFamily:"'Outfit',sans-serif"}}>{count}</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>}

      {/* Top grapes (wine) or Top brands (spirits) */}
      {topItems.length>0&&<div style={{background:"rgba(255,255,255,0.02)",borderRadius:14,border:"1px solid rgba(255,255,255,0.07)",padding:20}}>
        <div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.42)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16,fontFamily:"'Outfit',sans-serif"}}>{isWine?"Top grapes":"Top brands"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {topItems.map(([g,n])=>(
            <div key={g}><Bar label={g} n={n} max={maxG} labelWidth={130}/></div>
          ))}
        </div>
      </div>}
    </div>
  );
};

      <div onClick={e=>e.stopPropagation()} style={{background:"#1e2028",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,animation:"sheetUp 0.4s cubic-bezier(.22,1,.36,1)",border:"1px solid rgba(255,255,255,0.10)",borderBottom:"none",padding:24}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><div style={{width:32,height:3,borderRadius:2,background:"rgba(255,255,255,0.22)"}}/></div>

        </p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={()=>onConfirm(wine.rating,"")} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:"#fff",color:"#1e2028",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{t("markFinished")}</button>
          <button onClick={()=>onDelete()} style={{width:"100%",padding:"13px",borderRadius:10,border:"1px solid rgba(239,68,68,0.15)",background:"transparent",color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{t("deleteForever")}</button>
          <button onClick={onCancel} style={{width:"100%",padding:"13px",borderRadius:10,border:"1px solid rgba(255,255,255,0.10)",background:"transparent",color:"rgba(255,255,255,0.42)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{t("back")}</button>
        </div>
      </div>
    </div>
  );

  // Not yet rated: full rating form
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000,backdropFilter:"blur(12px)"}} onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#1e2028",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,animation:"sheetUp 0.4s cubic-bezier(.22,1,.36,1)",border:"1px solid rgba(255,255,255,0.10)",borderBottom:"none",padding:24}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><div style={{width:32,height:3,borderRadius:2,background:"rgba(255,255,255,0.22)"}}/></div>
        <h2 style={{fontSize:18,fontWeight:700,color:"#fff",margin:"0 0 4px",fontFamily:"'Outfit',sans-serif"}}>{isLast?t("lastBottle"):t("bottleOpened")}</h2>
        <p style={{fontSize:13,color:"rgba(255,255,255,0.48)",margin:"0 0 16px",fontFamily:"'Outfit',sans-serif"}}>
          {wine.vineyard} — {wine.name||wine.type}
        </p>

        <div style={{marginBottom:16}}>
          <label style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.52)",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'Outfit',sans-serif",display:"block",marginBottom:8}}>{t("howWasIt")}</label>
          <FPSlider value={fp} onChange={setFp}/>
        </div>

        <div style={{marginBottom:20}}>
          <label style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.52)",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'Outfit',sans-serif",display:"block",marginBottom:8}}>{t("noteLabel")}</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder={t("howTaste")}
            style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.13)",borderRadius:10,padding:"11px 14px",color:"#fff",fontSize:14,outline:"none",resize:"vertical",fontFamily:"'Outfit',sans-serif"}}/>

            {t("withoutRating")}
          </button>
          {isLast&&<button onClick={()=>onDelete()} style={{width:"100%",padding:"13px",borderRadius:10,border:"1px solid rgba(239,68,68,0.15)",background:"transparent",color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>
            {t("deleteForever")}
          </button>}
          <button onClick={onCancel} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:"transparent",color:"rgba(255,255,255,0.32)",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{t("back")}</button>
        </div>
      </div>
    </div>
  );
};

// ─── App ──────────────────────────────────────────────────────────
function App(){
  const [splash,setSplash]=useState(true);
  const [wines,setWines]=useState([]);
  const [ok,setOk]=useState(false);
  const [tab,setTab]=useState("cellar");
  const [q,setQ]=useState("");
  const [sortBy,setSortBy]=useState("producer");
  const [activeFilter,setActiveFilter]=useState(null);
  const [filters,setFilters]=useState({cat:"Wine",type:null,vineyard:null,country:null,region:null,grape:null,ausbau:null,drinkWindow:null,rating:null});
  const [edit,setEdit]=useState(null);
  const [form,setForm]=useState(false);
  const [showAllTypes,setShowAllTypes]=useState(false);
  const [toast,setToast]=useState(null);
  const [drinkLog,setDrinkLog]=useState(null);
  const [finishLog,setFinishLog]=useState(null);
  const [lang,setLang2]=useState("en");
  const [apiKey,setApiKey]=useState("");
  const [userName,setUserName]=useState("");
  const [showSettings,setShowSettings]=useState(false);

  // ALL hooks must be before any conditional return
  useEffect(()=>{const t=setTimeout(()=>setSplash(false),1800);return()=>clearTimeout(t)},[]);
  useEffect(()=>{const s=load();
    if(s!==null){setWines(s)}
    else{const seed=decodeCollection();if(seed.length){setWines(seed);save(seed)}}
    // Load API key
    try{const k=localStorage.getItem("vintel-api-key");if(k){setApiKey(k);setAIKey(k)}}catch(e){}
    try{const n=localStorage.getItem("vintel-user-name");if(n)setUserName(n)}catch(e){}
    try{const l=localStorage.getItem("vintel-lang");if(l){setLang2(l);setLang(l)}}catch(e){}
    setOk(true);
  },[]);
  useEffect(()=>{if(ok)save(wines)},[wines,ok]);
  useEffect(()=>{if(toast){const t=setTimeout(()=>setToast(null),2500);return()=>clearTimeout(t)}},[toast]);

  const showToast=(msg)=>setToast(msg);
  const saveApiKey=(key)=>{setApiKey(key);try{localStorage.setItem("vintel-api-key",key)}catch(e){}};

  const setFilter=(key,val)=>{
    setFilters(p=>{
      const next={...p,[key]:p[key]===val?null:val};
      if(key==="country"&&next.country!==p.country) next.region=null;
      if(key==="cat"){next.type=null;next.grape=null;next.drinkWindow=null;next.ausbau=null;}
      return next;
    });
  };
  const clearFilters=()=>setFilters(p=>({cat:p.cat,type:null,vineyard:null,country:null,region:null,grape:null,ausbau:null,drinkWindow:null,rating:null}));
  const activeFilterCount=Object.values(filters).filter(Boolean).length;

  // Splash screen
  if(splash) return(
    <div style={{minHeight:"100vh",background:"#16181d",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      `}</style>
      <h1 style={{fontFamily:"'Outfit',sans-serif",fontSize:36,fontWeight:800,color:"#fff",margin:0,letterSpacing:"-0.03em",animation:"fadeInUp 0.6s ease"}}>
        Vintel<span style={{color:"rgba(255,255,255,0.22)"}}>.</span>
      </h1>
      <p style={{fontFamily:"'Outfit',sans-serif",fontSize:13,color:"rgba(255,255,255,0.25)",margin:0,animation:"fadeIn 0.8s ease 0.3s both"}}>
        Wine & Spirits Collection
      </p>
      <div style={{width:32,height:3,borderRadius:2,background:"rgba(255,255,255,0.07)",marginTop:24,overflow:"hidden",animation:"fadeIn 0.5s ease 0.5s both"}}>
        <div style={{width:"100%",height:"100%",background:"rgba(255,255,255,0.25)",borderRadius:2,animation:"loadBar 1.2s ease 0.6s both"}}/>
      </div>
      <style>{`@keyframes loadBar{from{transform:translateX(-100%)}to{transform:translateX(0)}}`}</style>
    </div>
  );

  const filtered=wines
    .filter(w=>!w.finished)
    .filter(w=>!filters.cat||w.cat===filters.cat)
    .filter(w=>!filters.type||w.type===filters.type)
    .filter(w=>!filters.vineyard||w.vineyard===filters.vineyard)
    .filter(w=>!filters.country||w.country===filters.country)
    .filter(w=>!filters.region||w.region===filters.region)
    .filter(w=>!filters.grape||w.grape===filters.grape)
    .filter(w=>!filters.ausbau||(filters.ausbau==="No wood"?!w.ausbau||w.ausbau==="Stainless Steel"||w.ausbau==="Concrete Egg"||w.ausbau==="Amphora/Clay":filters.ausbau==="Wood"?w.ausbau==="Oak Barrel (new)"||w.ausbau==="Oak Barrel (used)"||w.ausbau==="Barrique"||w.ausbau==="Mixed":w.ausbau===filters.ausbau))
    .filter(w=>{if(!filters.drinkWindow)return true;const thisY=new Date().getFullYear();const from=parseInt(w.drinkFrom)||0;const to=parseInt(w.drinkTo)||0;if(!from&&!to)return filters.drinkWindow===t("notSet");if(to&&to<thisY)return filters.drinkWindow===t("overdue");if(from&&from<=thisY&&(!to||to>=thisY))return filters.drinkWindow===t("drinkNow");if(from){const wait=from-thisY;if(wait<=3)return filters.drinkWindow===t("y13");if(wait<=5)return filters.drinkWindow===t("y35");if(wait<=10)return filters.drinkWindow===t("y510");return filters.drinkWindow===t("y10")}return filters.drinkWindow===t("notSet")})
    .filter(w=>!filters.rating||w.rating>=filters.rating)
    .filter(w=>!q||[w.vineyard,w.name,w.country,w.region,w.grape].some(f=>f?.toLowerCase().includes(q.toLowerCase())))
    .sort((a,b)=>{
      if(sortBy==="price-asc") return (a.price||0)-(b.price||0);
      if(sortBy==="price-desc") return (b.price||0)-(a.price||0);
      if(sortBy==="vintage") return (b.year||0)-(a.year||0);
      if(sortBy==="fp") return (b.rating||0)-(a.rating||0);
      return (a.vineyard||"").localeCompare(b.vineyard||"")||a.name.localeCompare(b.name);
    });

  const winesMatchingOtherFilters=(excludeKey)=>wines
    .filter(w=>excludeKey==="cat"||!filters.cat||w.cat===filters.cat)
    .filter(w=>excludeKey==="type"||!filters.type||w.type===filters.type)
    .filter(w=>excludeKey==="vineyard"||!filters.vineyard||w.vineyard===filters.vineyard)
    .filter(w=>excludeKey==="country"||!filters.country||w.country===filters.country)
    .filter(w=>excludeKey==="region"||!filters.region||w.region===filters.region)
    .filter(w=>excludeKey==="grape"||!filters.grape||w.grape===filters.grape)
    .filter(w=>excludeKey==="ausbau"||!filters.ausbau||(filters.ausbau==="No wood"?!w.ausbau||w.ausbau==="Stainless Steel"||w.ausbau==="Concrete Egg"||w.ausbau==="Amphora/Clay":filters.ausbau==="Wood"?w.ausbau==="Oak Barrel (new)"||w.ausbau==="Oak Barrel (used)"||w.ausbau==="Barrique"||w.ausbau==="Mixed":w.ausbau===filters.ausbau))
    .filter(w=>{if(excludeKey==="drinkWindow"||!filters.drinkWindow)return true;const thisY=new Date().getFullYear();const from=parseInt(w.drinkFrom)||0;const to=parseInt(w.drinkTo)||0;if(!from&&!to)return filters.drinkWindow===t("notSet");if(to&&to<thisY)return filters.drinkWindow===t("overdue");if(from&&from<=thisY&&(!to||to>=thisY))return filters.drinkWindow===t("drinkNow");if(from){const wait=from-thisY;if(wait<=3)return filters.drinkWindow===t("y13");if(wait<=5)return filters.drinkWindow===t("y35");if(wait<=10)return filters.drinkWindow===t("y510");return filters.drinkWindow===t("y10")}return filters.drinkWindow===t("notSet")})

  const countByVal=(key)=>{

  const grapeCounts=countByVal("grape");
  const drinkCounts=(()=>{const pool=winesMatchingOtherFilters("drinkWindow");const thisY=new Date().getFullYear();const c={[t("overdue")]:0,[t("drinkNow")]:0,[t("y13")]:0,[t("y35")]:0,[t("y510")]:0,[t("y10")]:0,[t("notSet")]:0};pool.forEach(w=>{if(!w.drinkFrom&&!w.drinkTo){c[t("notSet")]+=w.qty;return}const from=parseInt(w.drinkFrom)||0;const to=parseInt(w.drinkTo)||0;if(to&&to<thisY)c[t("overdue")]+=w.qty;else if(from&&from<=thisY&&(!to||to>=thisY))c[t("drinkNow")]+=w.qty;else if(from){const wait=from-thisY;if(wait<=3)c[t("y13")]+=w.qty;else if(wait<=5)c[t("y35")]+=w.qty;else if(wait<=10)c[t("y510")]+=w.qty;else c[t("y10")]+=w.qty}else c[t("notSet")]+=w.qty});return c})();

  const ratingCounts={};
  [9,8,7,6,5].forEach(r=>{
    ratingCounts[r]=winesMatchingOtherFilters("rating").filter(w=>w.rating>=r).reduce((s,w)=>s+w.qty,0);

    {id:"stats",label:t("insights"),icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#16181d",color:"#fff",fontFamily:"'Outfit', -apple-system, sans-serif"}}>
      <style>{`

        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.13);border-radius:2px}
        @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}

              <div style={{width:26,height:26,borderRadius:8,background:"rgba(255,255,255,0.10)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {userName?<span style={{fontSize:12,fontWeight:700,color:"#fff",fontFamily:"'Outfit',sans-serif"}}>{userName.charAt(0).toUpperCase()}</span>:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.42)" strokeWidth="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>}

            </button>

              style={{padding:"9px 18px",borderRadius:10,border:"none",background:"#fff",color:"#16181d",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Outfit',sans-serif",letterSpacing:"-0.01em",transition:"opacity 0.2s"}}
              onMouseEnter={e=>e.target.style.opacity="0.85"} onMouseLeave={e=>e.target.style.opacity="1"}>

          </div>
        </div>
      </header>

      <nav style={{borderBottom:"1px solid rgba(255,255,255,0.07)",position:"sticky",top:0,zIndex:50,background:"#16181d"}}>

            {[["producer",t("sortProducer")],["price-asc",t("sortPriceUp")],["price-desc",t("sortPriceDown")],["vintage",t("sortVintage")],["fp","FP ↓"]].map(([k,l])=>(

                }}>{g} <span style={{opacity:0.4,fontSize:11}}>{n}</span></button>
              ))}

              {activeFilter==="ausbau"&&["Wood","No wood","Stainless Steel","Oak Barrel (new)","Oak Barrel (used)","Barrique","Concrete Egg","Amphora/Clay","Mixed"].filter(a=>ausbauCounts[a]).map(a=>{const aLabel=a==="Wood"?t("woodFilter"):a==="No wood"?t("noWoodFilter"):a;return(
                <button key={a} onClick={()=>{setFilter("ausbau",a);setActiveFilter(null)}} style={{
                  padding:"7px 14px",borderRadius:8,border:filters.ausbau===a?"1px solid rgba(255,255,255,0.25)":"1px solid rgba(255,255,255,0.07)",
                  background:filters.ausbau===a?"rgba(255,255,255,0.10)":"transparent",color:filters.ausbau===a?"#fff":"rgba(255,255,255,0.58)",
                  fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.15s",
                  display:"flex",alignItems:"center",gap:6
                }}>{aLabel} <span style={{opacity:0.4,fontSize:11}}>{ausbauCounts[a]}</span></button>
              )})}

              {activeFilter==="drinkWindow"&&[t("overdue"),t("drinkNow"),t("y13"),t("y35"),t("y510"),t("y10"),t("notSet")].filter(d=>drinkCounts[d]).map(d=>(
                <button key={d} onClick={()=>{setFilter("drinkWindow",d);setActiveFilter(null)}} style={{
                  padding:"7px 14px",borderRadius:8,border:filters.drinkWindow===d?"1px solid rgba(255,255,255,0.25)":"1px solid rgba(255,255,255,0.07)",
                  background:filters.drinkWindow===d?"rgba(255,255,255,0.10)":"transparent",color:filters.drinkWindow===d?"#fff":"rgba(255,255,255,0.58)",
                  fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.15s",
                  display:"flex",alignItems:"center",gap:6
                }}>{d} <span style={{opacity:0.4,fontSize:11}}>{drinkCounts[d]}</span></button>
              ))}

              {activeFilter==="rating"&&[9,8,7,6,5].filter(r=>ratingCounts[r]).map(r=>(
                <button key={r} onClick={()=>{setFilter("rating",r);setActiveFilter(null)}} style={{
                  padding:"7px 14px",borderRadius:8,border:filters.rating===r?"1px solid rgba(255,255,255,0.25)":"1px solid rgba(255,255,255,0.07)",
                  background:filters.rating===r?"rgba(255,255,255,0.10)":"transparent",color:filters.rating===r?"#fff":"rgba(255,255,255,0.58)",
                  fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",transition:"all 0.15s",
                  display:"flex",alignItems:"center",gap:6
                }}>{r}+ FP ({fpLabel(r)}) <span style={{opacity:0.4,fontSize:11}}>{ratingCounts[r]}</span></button>
              ))}
            </div>}
          </div>

          {/* List */}
          {filtered.length===0?
            <div style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{width:48,height:48,borderRadius:12,background:"rgba(255,255,255,0.03)",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.22)" strokeWidth="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              </div>
              <p style={{fontSize:16,fontWeight:600,color:"rgba(255,255,255,0.62)",margin:0}}>{wines.length===0?t("startCollection"):t("noResults")}</p>
              <p style={{fontSize:13,color:"rgba(255,255,255,0.32)",marginTop:6}}>{wines.length===0?t("addFirst"):t("adjustFilters")}</p>
            </div>:
            <div>
              {filtered.map(w=><WineRow key={w.id} wine={w} onClick={w=>{setEdit(w);setForm(true)}} onUpdateQty={(id,qty)=>setWines(p=>p.map(x=>x.id===id?{...x,qty}:x))} onRemove={id=>setWines(p=>p.filter(x=>x.id!==id))} onDrink={w=>{if(w.rating>0){setWines(p=>p.map(x=>x.id===w.id?{...x,qty:x.qty-1}:x));showToast(t("bottleRemoved"))}else{setDrinkLog(w)}}} onFinish={w=>setFinishLog(w)}/>)}
              <div style={{textAlign:"center",padding:"16px 0",fontSize:12,color:"rgba(255,255,255,0.22)",fontWeight:500}}>
                {filtered.length} {filters.cat==="Spirit"?t("footerSpirits"):t("footerWines")} · {filtered.reduce((s,w)=>s+w.qty,0)} {t("footerBottles")} · €{filtered.reduce((s,w)=>s+w.price*w.qty,0).toLocaleString("de-AT")} {t("footerTotal")}
              </div>
            </div>
          }

          {/* Finished wines */}
          {(()=>{
            const fin=wines.filter(w=>w.finished&&(!filters.cat||w.cat===filters.cat));
            if(!fin.length) return null;
            return(
              <div style={{marginTop:12,paddingTop:16,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
                <div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.32)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12,fontFamily:"'Outfit',sans-serif"}}>{t("finishedWines")} ({fin.length})</div>
                {fin.map(w=>{const c=TC[w.type]||TC.Red;return(
                  <div key={w.id} onClick={()=>{setEdit(w);setForm(true)}} style={{padding:"12px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",gap:12,alignItems:"center",cursor:"pointer",opacity:0.5}}>
                    <div style={{width:36,height:36,borderRadius:8,background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:c.dot}}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.52)",fontFamily:"'Outfit',sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.vineyard}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.32)",fontFamily:"'Outfit',sans-serif"}}>{w.grape?w.grape+" · ":""}{w.name}{w.year?" · "+w.year:""}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      {w.rating>0&&<span style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.42)",fontFamily:"'Outfit',sans-serif"}}>{w.rating} FP</span>}
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontFamily:"'Outfit',sans-serif"}}>{w.finished}</div>
                    </div>
                  </div>
                )})}
              </div>
            );
          })()}
        </>}

        {tab==="sommelier"&&<Chat wines={wines}/>}
        {tab==="stats"&&<Stats wines={wines}/>}
      </main>

      {form&&<WineForm wine={edit} onSave={w=>{setWines(p=>p.find(x=>x.id===w.id)?p.map(x=>x.id===w.id?w:x):[...p,w]);showToast(edit?t("saved"):t("added"))}} onDelete={id=>{setWines(p=>p.filter(w=>w.id!==id));showToast(t("removed"))}} onClose={()=>{setForm(false);setEdit(null)}}/>}

      {/* Drink Log Modal (qty > 1) */}
      {drinkLog&&<DrinkLog wine={drinkLog} isLast={false}
        onConfirm={(fp,note)=>{
          const now=new Date().toISOString().slice(0,10);
          setWines(p=>p.map(w=>w.id===drinkLog.id?{...w,qty:w.qty-1,rating:fp||w.rating,notes:note?(w.notes?w.notes+"\n"+now+": "+note:now+": "+note):w.notes}:w));
          showToast(`${drinkLog.vineyard} — ${fp} FP 🍷`);
          setDrinkLog(null);
        }}
        onSkip={()=>{setWines(p=>p.map(w=>w.id===drinkLog.id?{...w,qty:w.qty-1}:w));showToast(t("bottleRemoved"));setDrinkLog(null)}}
        onCancel={()=>setDrinkLog(null)}
      />}

      {/* Finish Log Modal (last bottle) */}
      {finishLog&&<DrinkLog wine={finishLog} isLast={true}
        onConfirm={(fp,note)=>{
          const now=new Date().toISOString().slice(0,10);
          setWines(p=>p.map(w=>w.id===finishLog.id?{...w,qty:0,finished:now,rating:fp||w.rating,notes:note?(w.notes?w.notes+"\n"+now+": "+note:now+": "+note):w.notes}:w));
          showToast(`${finishLog.vineyard} — ${t("finished")} 🍷`);
          setFinishLog(null);
        }}
        onSkip={()=>{setWines(p=>p.map(w=>w.id===finishLog.id?{...w,qty:0,finished:new Date().toISOString().slice(0,10)}:w));showToast(t("finished"));setFinishLog(null)}}
        onDelete={()=>{setWines(p=>p.filter(w=>w.id!==finishLog.id));showToast(t("removed"));setFinishLog(null)}}
        onCancel={()=>setFinishLog(null)}
      />}

      {/* Settings Modal */}
      {showSettings&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000,backdropFilter:"blur(12px)"}} onClick={()=>setShowSettings(false)}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#1e2028",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,maxHeight:"90vh",overflow:"auto",animation:"sheetUp 0.4s cubic-bezier(.22,1,.36,1)",border:"1px solid rgba(255,255,255,0.10)",borderBottom:"none",padding:24}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><div style={{width:32,height:3,borderRadius:2,background:"rgba(255,255,255,0.22)"}}/></div>
          <h2 style={{fontSize:18,fontWeight:700,color:"#fff",margin:"0 0 20px",fontFamily:"'Outfit',sans-serif"}}>{t("settings")}</h2>

          <div style={{marginBottom:20}}>
            <label style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.52)",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'Outfit',sans-serif",display:"block",marginBottom:8}}>{t("language")}</label>
            <div style={{display:"flex",gap:8}}>{Object.entries(LANGS).map(([k,v])=>(<button key={k} onClick={()=>{setLang2(k);setLang(k)}} style={{flex:1,padding:"10px",borderRadius:8,border:lang===k?"1px solid rgba(255,255,255,0.32)":"1px solid rgba(255,255,255,0.10)",background:lang===k?"rgba(255,255,255,0.10)":"transparent",color:lang===k?"#fff":"rgba(255,255,255,0.42)",fontSize:13,fontWeight:lang===k?600:400,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{v}</button>))}</div>
          </div>

          <div style={{marginBottom:20}}>
            <label style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.52)",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'Outfit',sans-serif",display:"block",marginBottom:8}}>{t("name")}</label>
            <input value={userName} onChange={e=>setUserName(e.target.value)} placeholder={t("yourName")} style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.13)",borderRadius:10,padding:"11px 14px",color:"#fff",fontSize:14,outline:"none",fontFamily:"'Outfit',sans-serif"}}/>
          </div>

          <div style={{marginBottom:20}}>
            <label style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.52)",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'Outfit',sans-serif",display:"block",marginBottom:8}}>{t("apiKeyLabel")}</label>
            <input type="password" value={apiKey} onChange={e=>{const v=e.target.value;setApiKey(v);setAIKey(v)}} placeholder="sk-ant-..." style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.13)",borderRadius:10,padding:"11px 14px",color:"#fff",fontSize:14,outline:"none",fontFamily:"'Outfit',sans-serif"}}/>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.32)",marginTop:8,lineHeight:1.5,fontFamily:"'Outfit',sans-serif"}}>
              {t("apiKeyHint")}
            </p>
          </div>

          <button onClick={async()=>{saveApiKey(apiKey);setAIKey(apiKey);try{localStorage.setItem("vintel-user-name",userName)}catch(e){}
try{localStorage.setItem("vintel-lang",lang)}catch(e){}showToast(t("settingsSaved"));setShowSettings(false)}} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:"#fff",color:"#1e2028",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{t("save")}</button>

          {/* Export / Import */}
          <div style={{marginTop:24,paddingTop:20,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
            <label style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.52)",textTransform:"uppercase",letterSpacing:"0.1em",fontFamily:"'Outfit',sans-serif",display:"block",marginBottom:12}}>Import / Export</label>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <button onClick={()=>{const data=JSON.stringify(wines,null,2);const blob=new Blob([data],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`vintel-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url)}} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.10)",background:"transparent",color:"rgba(255,255,255,0.52)",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                {t("exportJson")}
              </button>
              <button onClick={()=>{const lines=wines.map(w=>[w.vineyard||"",w.name||"",w.cat||"Wine",w.type||"",w.grape||"",w.country||"",w.region||"",w.year||"",w.price||0,w.ausbau||"",w.drinkFrom||w.drinkWindow||"",w.drinkTo||"",w.qty||1,w.rating||0,w.notes||"",w.abv||""].map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`).join(","));const csv="Producer,Name,Category,Type,Grape,Country,Region,Year,Price,Aging,DrinkFrom,DrinkTo,Qty,Rating,Notes,ABV\n"+lines.join("\n");const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`vintel-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url)}} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.10)",background:"transparent",color:"rgba(255,255,255,0.52)",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                {t("exportCsv")}
              </button>
            </div>
            <label style={{display:"block",width:"100%",padding:"11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.10)",background:"transparent",color:"rgba(255,255,255,0.52)",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"'Outfit',sans-serif",textAlign:"center"}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{verticalAlign:"middle",marginRight:6}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              {t("importJson")}
              <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;const reader=new FileReader();reader.onload=()=>{try{const items=JSON.parse(reader.result);if(Array.isArray(items)){const replace=wines.length>0&&confirm(t("importReplace"));if(replace){setWines(items.map((it,i)=>({...it,id:i+1})))}else{const maxId=Math.max(0,...wines.map(w=>w.id));setWines(p=>[...p,...items.map((it,i)=>({...it,id:maxId+i+1}))])};showToast(`${items.length} items imported ✓`);setShowSettings(false)}}catch(e){showToast(t("invalidJson"))}};reader.readAsText(f);e.target.value=""}}/>
            </label>
          </div>

          {/* Danger zone */}
          <div style={{marginTop:20,paddingTop:20,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
            <button onClick={()=>{
              if(!confirm(t("resetConfirm"))) return;
              // Offer backup
              if(wines.length>0&&confirm(t("resetBackup"))){
                const data=JSON.stringify(wines,null,2);
                const blob=new Blob([data],{type:"application/json"});
                const url=URL.createObjectURL(blob);
                const a=document.createElement("a");
                a.href=url;a.download=`vintel-backup-${new Date().toISOString().slice(0,10)}.json`;
                a.click();URL.revokeObjectURL(url);
              }
              // Reset
              setWines([]);setApiKey("");setAIKey("");setUserName("");
              try{localStorage.setItem(SK,JSON.stringify([]))}catch(e){}
              try{localStorage.setItem("vintel-api-key","")}catch(e){}
              try{localStorage.setItem("vintel-user-name","")}catch(e){}
              save([]);
              showToast(t("resetDone"));setShowSettings(false);
            }} style={{width:"100%",padding:"13px",borderRadius:10,border:"1px solid rgba(239,68,68,0.2)",background:"transparent",color:"#f87171",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{t("resetData")}</button>
          </div>
        </div>
      </div>}

      {/* Toast */}
      {toast&&<div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",padding:"12px 24px",borderRadius:12,background:"rgba(255,255,255,0.95)",color:"#1e2028",fontSize:14,fontWeight:600,fontFamily:"'Outfit',sans-serif",boxShadow:"0 8px 32px rgba(0,0,0,0.3)",zIndex:2000,animation:"fadeIn 0.2s ease",whiteSpace:"nowrap"}}>{toast}</div>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body></html>
